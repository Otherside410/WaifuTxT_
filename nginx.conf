server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Steam presence API to the steam-presence service on the shared
    # docker network. Strips the /api/steam/ prefix so /api/steam/link/start
    # reaches the backend as /steam/link/start.
    location /api/steam/ {
        proxy_pass http://steam-presence:3000/steam/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
