name: Build & Deploy Pre-prod

on:
  push:
    branches: [test-prp]

env:
  IMAGE: ghcr.io/otherside410/waifutxt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:preprod
            ${{ env.IMAGE }}:preprod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy pre-prod via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: waifuchat.duckdns.org
          port: 7200
          username: orangepi
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/docker/dev-waifu-matrix
            docker compose pull
            docker compose up -d --remove-orphans

  notify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 🟢 Notification Matrix (Succès)
        if: ${{ needs.build.result == 'success' && needs.deploy.result == 'success' }}
        uses: lkiesow/matrix-notification@v1.4.1
        with:
          server: ${{ secrets.MATRIX_HOMESERVER }}
          token: ${{ secrets.MATRIX_TOKEN }}
          room: ${{ secrets.MATRIX_ROOM_ID }}
          message: |
            ✅ Déploiement [Pré-Prod] Réussi !
            Le code de ${{ github.actor }} a été mis en ligne avec succès.
            📝 Commit : ${{ github.event.head_commit.message }}
          formatted_message: |
            ✅ <strong>Déploiement [Pré-Prod] Réussi !</strong><br>
            Le code de <strong>${{ github.actor }}</strong> a été mis en ligne avec succès.<br>
            📝 Commit : ${{ github.event.head_commit.message }}

      - name: 🔴 Notification Matrix (Échec)
        if: ${{ needs.build.result == 'failure' || needs.deploy.result == 'failure' }}
        uses: lkiesow/matrix-notification@v1.4.1
        with:
          server: ${{ secrets.MATRIX_HOMESERVER }}
          token: ${{ secrets.MATRIX_TOKEN }}
          room: ${{ secrets.MATRIX_ROOM_ID }}
          message: |
            ❌ Échec du déploiement [Pré-Prod] !
            Une erreur est survenue lors de l'intégration du code de ${{ github.actor }}.
            🔍 Logs : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          formatted_message: |
            ❌ <strong>Échec du déploiement [Pré-Prod] !</strong><br>
            Une erreur est survenue lors de l'intégration du code de <strong>${{ github.actor }}</strong>.<br>
            🔍 <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Vérifier les logs du run</a>
